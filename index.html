<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Did It Happen?</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Did It Happen?" />
  <meta name="theme-color" content="#f5f5f5" />

  <style>
    :root {
      --bg: #f5f5f5;
      --text: #111;
      --text-dim: #888;
      --border: #ddd;
      --yes: #2a7a2a;
      --yes-bg: #e8f5e8;
      --no: #a02020;
      --no-bg: #fdecea;
      --store: #1a6090;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding-top: calc(var(--safe-top) + 16px);
      padding-bottom: calc(var(--safe-bottom) + 16px);
      transition: opacity 0.2s ease;
    }
    .screen.hidden { opacity: 0; pointer-events: none; }

    /* ── MAIN SCREEN ── */
    #screen-main { align-items: center; justify-content: space-between; }

    .main-title {
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      padding: 24px 0 8px;
    }

    .timestamp-display {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.7;
    }

    .btn-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      padding: 0 32px;
    }

    .answer-btn {
      border: 1.5px solid transparent;
      border-radius: 12px;
      font-family: -apple-system, sans-serif;
      font-size: 26px;
      font-weight: 600;
      padding: 40px 0;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.1s ease;
    }
    .answer-btn:active { transform: scale(0.96); opacity: 0.85; }
    .btn-yes { background: var(--yes-bg); color: var(--yes); border-color: #b5d9b5; }
    .btn-no  { background: var(--no-bg);  color: var(--no);  border-color: #f0c0bb; }

    .status-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      min-height: 40px;
      padding: 0 24px;
    }
    .geo-status { font-size: 11px; color: var(--text-dim); text-align: center; }
    .store-status {
      font-size: 12px; color: var(--store); text-align: center;
      opacity: 0; transition: opacity 0.3s; min-height: 16px;
    }
    .store-status.visible { opacity: 1; }
    .store-status.dim { color: var(--text-dim); }

    .bottom-bar {
      width: 100%; padding: 0 32px;
      display: flex; justify-content: center;
    }
    .history-btn {
      width: 100%; padding: 14px;
      background: white; border: 1px solid var(--border);
      border-radius: 10px; font-family: -apple-system, sans-serif;
      font-size: 15px; color: var(--text); cursor: pointer;
    }
    .history-btn:active { background: #eee; }

    /* ── BUSYNESS SCREEN ── */
    #screen-busy { align-items: center; justify-content: center; gap: 32px; }

    .busy-question {
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      padding: 0 32px;
    }
    .busy-sub {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      margin-top: 6px;
    }

    .busy-scale {
      display: flex;
      gap: 12px;
      padding: 0 24px;
    }
    .busy-btn {
      flex: 1;
      aspect-ratio: 1;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: transform 0.1s, background 0.1s;
    }
    .busy-btn:active { transform: scale(0.93); background: #eee; }
    .busy-btn .busy-label {
      font-size: 9px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0.03em;
    }

    .busy-skip {
      background: none; border: none;
      font-family: -apple-system, sans-serif;
      font-size: 14px; color: var(--text-dim);
      cursor: pointer; padding: 4px;
    }
    .busy-skip:active { color: var(--text); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 90px);
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #222; color: white;
      font-size: 13px; padding: 9px 20px;
      border-radius: 100px; opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none; white-space: nowrap; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── LOG SCREEN ── */
    #screen-log { overflow: hidden; }

    .log-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .log-header-title { font-size: 17px; font-weight: 600; }
    .log-stats { font-size: 13px; color: var(--text-dim); }
    .log-stats .yes-count { color: var(--yes); font-weight: 500; }
    .log-stats .no-count  { color: var(--no);  font-weight: 500; }

    .log-toolbar {
      padding: 10px 20px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .back-btn, .export-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 7px; font-family: -apple-system, sans-serif;
      font-size: 13px; color: var(--text); padding: 6px 14px; cursor: pointer;
    }
    .back-btn:active, .export-btn:active { background: #eee; }

    .log-list {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .log-empty { text-align: center; color: var(--text-dim); font-size: 14px; margin-top: 60px; }

    .log-day-label {
      font-size: 12px; color: var(--text-dim); font-weight: 500;
      padding: 12px 20px 4px; background: var(--bg);
      position: sticky; top: 0;
    }

    .log-row {
      display: grid;
      grid-template-columns: 44px 1fr 28px;
      align-items: start;
      gap: 10px; padding: 10px 20px;
      border-bottom: 1px solid #ebebeb;
      background: white;
    }

    .log-badge {
      font-size: 13px; font-weight: 600;
      text-align: center; padding: 3px 0;
      border-radius: 6px; margin-top: 1px;
    }
    .log-badge.yes { color: var(--yes); background: var(--yes-bg); }
    .log-badge.no  { color: var(--no);  background: var(--no-bg);  }

    .log-meta { display: flex; flex-direction: column; gap: 2px; }
    .log-time  { font-size: 13px; color: var(--text); }
    .log-geo   { font-size: 11px; color: var(--text-dim); }
    .log-store { font-size: 12px; color: var(--store); }
    .log-store.none { color: var(--text-dim); }
    .log-busy  { font-size: 11px; color: var(--text-dim); }

    .log-delete {
      background: none; border: none; color: #ccc;
      font-size: 18px; cursor: pointer; padding: 2px 4px; line-height: 1;
    }
    .log-delete:active { color: var(--no); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 9px; height: 9px;
      border: 1.5px solid #ccc; border-top-color: var(--store);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 4px;
    }
  </style>
</head>
<body>

<!-- MAIN SCREEN -->
<div class="screen" id="screen-main">
  <div class="main-title">Did It Happen?</div>
  <div class="timestamp-display">
    <div id="display-date">—</div>
    <div id="display-time">—</div>
  </div>
  <div class="btn-pair">
    <button class="answer-btn btn-yes" onclick="startRecord('yes')">Yes</button>
    <button class="answer-btn btn-no"  onclick="startRecord('no')">No</button>
  </div>
  <div class="status-stack">
    <div class="geo-status" id="geo-status">acquiring location…</div>
    <div class="store-status" id="store-status"></div>
  </div>
  <div class="bottom-bar">
    <button class="history-btn" onclick="showLog()">History</button>
  </div>
</div>

<!-- BUSYNESS SCREEN -->
<div class="screen hidden" id="screen-busy">
  <div>
    <div class="busy-question">How busy was the lot?</div>
    <div class="busy-sub">Just your gut feeling</div>
  </div>
  <div class="busy-scale">
    <button class="busy-btn" onclick="finishRecord(1)">1<span class="busy-label">empty</span></button>
    <button class="busy-btn" onclick="finishRecord(2)">2<span class="busy-label"></span></button>
    <button class="busy-btn" onclick="finishRecord(3)">3<span class="busy-label">moderate</span></button>
    <button class="busy-btn" onclick="finishRecord(4)">4<span class="busy-label"></span></button>
    <button class="busy-btn" onclick="finishRecord(5)">5<span class="busy-label">packed</span></button>
  </div>
  <button class="busy-skip" onclick="finishRecord(null)">skip</button>
</div>

<!-- LOG SCREEN -->
<div class="screen hidden" id="screen-log">
  <div class="log-header">
    <span class="log-header-title">History</span>
    <span class="log-stats">
      <span class="yes-count" id="stat-yes">0</span> yes &nbsp;
      <span class="no-count"  id="stat-no">0</span> no
    </span>
  </div>
  <div class="log-toolbar">
    <button class="back-btn" onclick="showMain()">← Back</button>
    <button class="export-btn" onclick="exportCSV()">Export CSV</button>
  </div>
  <div class="log-list" id="log-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'yesno_log_v1';
  let entries = [];
  let pendingEntry = null; // holds entry between yes/no tap and busyness selection

  function load() {
    try { entries = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { entries = []; }
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('display-date').textContent =
      now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    document.getElementById('display-time').textContent =
      now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // GPS
  let currentGeo = null;
  function startGeo() {
    const el = document.getElementById('geo-status');
    if (!navigator.geolocation) { el.textContent = 'location unavailable'; return; }
    navigator.geolocation.watchPosition(
      pos => {
        currentGeo = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: Math.round(pos.coords.accuracy) };
        el.textContent = `${currentGeo.lat.toFixed(5)}, ${currentGeo.lng.toFixed(5)}  ±${currentGeo.acc}m`;
      },
      err => {
        el.textContent = err.code === 1 ? 'location denied' : 'location error';
        currentGeo = null;
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
    );
  }
  startGeo();

  // Haversine
  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000, r = x => x * Math.PI / 180;
    const dLat = r(lat2-lat1), dLng = r(lng2-lng1);
    const a = Math.sin(dLat/2)**2 + Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLng/2)**2;
    return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
  }

  // Overpass
  async function findNearbyRetail(lat, lng) {
    const q = `[out:json][timeout:10];
(
  node["shop"](around:300,${lat},${lng});
  way["shop"](around:300,${lat},${lng});
  node["amenity"~"^(pharmacy|fast_food|restaurant|cafe|bank|fuel|supermarket)$"](around:300,${lat},${lng});
  way["amenity"~"^(pharmacy|fast_food|restaurant|cafe|bank|fuel|supermarket)$"](around:300,${lat},${lng});
);
out center;`;
    const resp = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: 'data=' + encodeURIComponent(q),
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
    });
    if (!resp.ok) throw new Error('Overpass error');
    const data = await resp.json();
    return data.elements
      .filter(el => el.tags)
      .map(el => {
        const elLat = el.lat ?? el.center?.lat;
        const elLng = el.lon  ?? el.center?.lon;
        if (!elLat || !elLng) return null;
        return {
          name: el.tags.name || el.tags.brand || null,
          type: el.tags.shop || el.tags.amenity || 'retail',
          dist: haversine(lat, lng, elLat, elLng)
        };
      })
      .filter(Boolean)
      .sort((a, b) => a.dist - b.dist);
  }

  // Step 1: tap Yes or No → show busyness screen
  function startRecord(answer) {
    pendingEntry = {
      id: Date.now(),
      answer,
      ts: new Date().toISOString(),
      geo: currentGeo ? { ...currentGeo } : null,
      busyness: null,
      nearby: null,
      nearbyStatus: 'pending'
    };
    showBusy();
  }

  // Step 2: tap busyness (or skip) → save and kick off store lookup
  async function finishRecord(busyness) {
    if (!pendingEntry) return;
    pendingEntry.busyness = busyness;
    entries.unshift(pendingEntry);
    save();
    showToast(pendingEntry.answer);

    const entry = pendingEntry;
    pendingEntry = null;
    showMain();

    if (!entry.geo) {
      entry.nearbyStatus = 'no-location'; save();
      setStoreStatus('no location — store lookup skipped', true);
      return;
    }

    setStoreStatus('<span class="spinner"></span>looking up nearby…', false);
    try {
      const results = await findNearbyRetail(entry.geo.lat, entry.geo.lng);
      const top = results[0] || null;
      entry.nearby = top ? { name: top.name, type: top.type, dist: top.dist, totalFound: results.length } : null;
      entry.nearbyStatus = 'done';
      save();
      if (top) {
        setStoreStatus(`🏪 ${top.name || top.type} · ${top.dist}m away`, false);
      } else {
        setStoreStatus('no retail within 300m', true);
      }
    } catch {
      entry.nearbyStatus = 'error'; save();
      setStoreStatus('store lookup failed', true);
    }
  }

  let storeTimer;
  function setStoreStatus(html, dim) {
    const el = document.getElementById('store-status');
    el.innerHTML = html;
    el.className = 'store-status visible' + (dim ? ' dim' : '');
    clearTimeout(storeTimer);
    storeTimer = setTimeout(() => { el.className = 'store-status'; }, 6000);
  }

  let toastTimer;
  function showToast(answer) {
    const el = document.getElementById('toast');
    el.textContent = answer === 'yes' ? 'Yes recorded' : 'No recorded';
    el.className = 'toast show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = 'toast', 1800);
  }

  // Nav
  function showMain() {
    document.getElementById('screen-busy').classList.add('hidden');
    document.getElementById('screen-log').classList.add('hidden');
    document.getElementById('screen-main').classList.remove('hidden');
  }
  function showBusy() {
    document.getElementById('screen-main').classList.add('hidden');
    document.getElementById('screen-busy').classList.remove('hidden');
  }
  function showLog() {
    renderLog();
    document.getElementById('screen-main').classList.add('hidden');
    document.getElementById('screen-log').classList.remove('hidden');
  }

  // Render log
  function renderLog() {
    const list = document.getElementById('log-list');
    document.getElementById('stat-yes').textContent = entries.filter(e => e.answer==='yes').length;
    document.getElementById('stat-no').textContent  = entries.filter(e => e.answer==='no').length;

    if (!entries.length) { list.innerHTML = '<div class="log-empty">No entries yet</div>'; return; }

    const groups = {};
    entries.forEach(e => {
      const d = new Date(e.ts).toLocaleDateString('en-US',
        { weekday:'long', month:'long', day:'numeric', year:'numeric' });
      (groups[d] = groups[d] || []).push(e);
    });

    const busyLabel = n => n ? `lot busyness: ${n}/5` : '';

    list.innerHTML = Object.entries(groups).map(([date, items]) => `
      <div class="log-day-label">${date}</div>
      ${items.map(e => {
        let storeHtml;
        if (e.nearby) {
          storeHtml = `<span class="log-store">🏪 ${e.nearby.name || e.nearby.type} · ${e.nearby.dist}m</span>`;
        } else if (e.nearbyStatus === 'pending') {
          storeHtml = `<span class="log-store none">looking up…</span>`;
        } else {
          storeHtml = `<span class="log-store none">no retail nearby</span>`;
        }
        return `
          <div class="log-row">
            <span class="log-badge ${e.answer}">${e.answer==='yes'?'Yes':'No'}</span>
            <div class="log-meta">
              <span class="log-time">${new Date(e.ts).toLocaleTimeString('en-US',
                {hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
              ${e.geo
                ? `<span class="log-geo">${e.geo.lat.toFixed(5)}, ${e.geo.lng.toFixed(5)}</span>`
                : '<span class="log-geo">no location</span>'}
              ${storeHtml}
              ${e.busyness ? `<span class="log-busy">lot busyness: ${e.busyness}/5</span>` : ''}
            </div>
            <button class="log-delete" onclick="deleteEntry(${e.id})">×</button>
          </div>`;
      }).join('')}`
    ).join('');
  }

  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    save(); renderLog();
  }

  function exportCSV() {
    const header = 'id,answer,datetime,latitude,longitude,accuracy_m,busyness,nearest_place,place_type,dist_m,total_within_300m';
    const rows = entries.map(e => [
      e.id, e.answer, e.ts,
      e.geo?.lat ?? '', e.geo?.lng ?? '', e.geo?.acc ?? '',
      e.busyness ?? '',
      e.nearby?.name ? `"${e.nearby.name}"` : '',
      e.nearby?.type ?? '', e.nearby?.dist ?? '', e.nearby?.totalFound ?? ''
    ].join(','));
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([[header,...rows].join('\n')], {type:'text/csv'}));
    a.download = `log_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  load();
</script>
</body>
</html>
